# Nginx config for Advuman landing page
# Optimised for scroll-scrubbed MP4 sequences + PNG fallback

server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    # MP4/WebM are already compressed — don't waste CPU trying to gzip them
    gzip_types text/css text/javascript application/javascript
               application/json image/svg+xml;

    # ── File descriptor cache (helps with many small files) ──────────────────
    open_file_cache max=500 inactive=5m;
    open_file_cache_valid 2m;
    open_file_cache_min_uses 1;
    open_file_cache_errors on;

    # ── Sequence MP4/WebM — long cache, byte-range support for video seeking ─
    # byte-range (Accept-Ranges) is nginx's default for static files;
    # these headers make it explicit and enable CDN edge caching.
    location ~* ^/sequence\d+\.(mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Accept-Ranges bytes;
        access_log off;

        # Allow larger buffers for video streaming to reduce round-trips
        proxy_buffering off;
        sendfile on;
        tcp_nopush on;
    }

    # ── PNG sequence frames (fallback path, can be removed once MP4 is live) ─
    location ~* ^/sequence\d+/.*\.png$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Other static assets ──────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Service worker must not be cached (needs fresh copy on each visit)
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── CSS / JS — long cache (Vite fingerprints filenames) ─────────────────
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # ── HTML — short cache so deployments take effect quickly ────────────────
    location / {
        try_files $uri $uri.html $uri/index.html /index.html =404;
        expires 5m;
        add_header Cache-Control "public, max-age=300";
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
