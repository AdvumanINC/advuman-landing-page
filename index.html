<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADVUMAN</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family: Arial; background:#07080a; color:#fff; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

function SeverityBadge({ severity }) {
  const colors = {
    critical: "red",
    high: "orange",
    medium: "yellow",
    low: "green"
  };
  return <span style={{color:colors[severity]}}>{severity}</span>;
}

function LandingPage({ onEnter }) {
  const [alerts, setAlerts] = useState([]);

  useEffect(() => {
    fetchAlerts();
  }, []);

  async function fetchAlerts() {
    const { data, error } = await supabase
      .from("alerts")
      .select("*")
      .order("date", { ascending: false });

    if (error) console.error(error);
    else setAlerts(data);
  }

  return (
    <div style={{padding:40}}>
      <h1>ADVUMAN</h1>
      <button onClick={onEnter}>Go Dashboard</button>

      <h2>Latest Alerts</h2>
      {alerts.slice(0,4).map(a => (
        <div key={a.id} style={{marginBottom:10}}>
          <SeverityBadge severity={a.severity} />
          <div>{a.title}</div>
        </div>
      ))}
    </div>
  );
}

function Dashboard({ onBack }) {
  const [alerts, setAlerts] = useState([]);
  const [indexes, setIndexes] = useState([]);
  const [sectors, setSectors] = useState([]);

  const [filterSeverity, setFilterSeverity] = useState("all");

  useEffect(() => {
    fetchAll();
  }, []);

  async function fetchAll() {
    const { data: alertsData } = await supabase
      .from("alerts")
      .select("*")
      .order("date", { ascending: false });

    const { data: indexData } = await supabase
      .from("indexes")
      .select("*");

    const { data: sectorData } = await supabase
      .from("sectors")
      .select("*");

    setAlerts(alertsData || []);
    setIndexes(indexData || []);
    setSectors(sectorData || []);
  }

  const filtered = alerts.filter(a => {
    if(filterSeverity !== "all" && a.severity !== filterSeverity) return false;
    return true;
  });

  return (
    <div style={{padding:20}}>
      <button onClick={onBack}>Back</button>

      <h2>Indexes</h2>
      {indexes.map(i => (
        <div key={i.id}>{i.name}: {i.value}</div>
      ))}

      <h2>Sectors</h2>
      {sectors.map(s => (
        <div key={s.id}>{s.name} ({s.alerts})</div>
      ))}

      <h2>Alerts</h2>
      <select onChange={e=>setFilterSeverity(e.target.value)}>
        <option value="all">All</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>

      {filtered.map(a => (
        <div key={a.id} style={{border:"1px solid #333", margin:10, padding:10}}>
          <SeverityBadge severity={a.severity} />
          <h3>{a.title}</h3>
          <p>{a.summary}</p>
        </div>
      ))}
    </div>
  );
}

function App() {
  const [view, setView] = useState("landing");

  return view === "landing"
    ? <LandingPage onEnter={()=>setView("dashboard")} />
    : <Dashboard onBack={()=>setView("landing")} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
